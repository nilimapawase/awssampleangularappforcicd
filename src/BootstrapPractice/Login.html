<div class="container mt-4">
    <div class="row">
        <div class="col-md-8"></div>

        <div class="col-md-4">
            <div class="card">

                <div class="card-header">
                    <h3>Login Form</h3>
                </div>

                <div class="card-body">

                    <div class="mb-2">
                        <label>Email</label>
                        <input type="email"
                               class="form-control"
                               [(ngModel)]="email">
                    </div>

                    <div class="mb-2">
                        <label>Password</label>
                        <input type="password"
                               class="form-control"
                               [(ngModel)]="password">
                    </div>

                </div>

                <div class="card-footer">
                    <button class="btn btn-primary"
                            (click)="Login()">
                        Login
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
