<!-- <h2>Employee Page</h2> -->

<div class="container-fluid">
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h2>Employee Form</h2>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label>Employee Name</label>
                        <input type="text" class="form-control" [(ngModel)]="e.employeeName"/>
                    </div>
                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="text" class="form-control" [(ngModel)]="e.emailAddress"/>
                    </div>
                    <div class="mb-3">
                        <label>Employee Code</label>
                        <input type="text" class="form-control" [(ngModel)]="e.employeeCode"/>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="text" class="form-control" [(ngModel)]="e.password"/>
                    </div>
                    <div class="mb-3">
                        <label>Designation</label>
                        <input type="text" class="form-control" [(ngModel)]="e.designation"/>
                    </div>
                </div>
                <div class="card-footer">
                    <input type="button" value="Submit" class="btn btn-primary" (click)="addEmployee(e)" [hidden]="btnstatus"/>&nbsp;
                    <input type="button" value="Update" class="btn btn-info" (click)="updateEmployee(e)" [hidden]="!btnstatus" />&nbsp;
                    <input type="button" value="Cancle" class="btn btn-danger" (click)="clearData()"/>
                </div>

            </div>
        </div>
        <div class="col-md-8">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Sr No</th>
                        <th>Employee Name</th>
                        <th>Email Address</th>
                        <th>Employee Code</th>
                        <!-- <th>Password</th> -->
                        <th>Designation</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    @for(e of employees;track e;let i=$index)
                    {
                        <tr>
                            <td>{{i+1}}</td>
                            <td>{{e.employeeName}}</td>
                            <td>{{e.emailAddress}}</td>
                            <td>{{e.employeeCode}}</td>
                            <!-- <td>{{e.password}}</td> -->
                            <td>{{e.designation}}</td>
                            <td>
                                <button class="btn btn-info btn-sm" (click)="viewEmployee(e)">View</button>&nbsp;
                                <button class="btn btn-danger btn-sm" (click)="removeEmployee(e.employeeId)">Remove</button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
