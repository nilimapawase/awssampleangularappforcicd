<div class="container-fluid">
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h2>Student Form</h2>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label>Student Name</label>
                        <input type="text" class="form-control" [(ngModel)]="s.studentName"/>
                    </div>
                    <div class="mb-3">
                        <label>Mobile Number</label>
                        <input type="text" class="form-control" [(ngModel)]="s.mobileNumber"/>
                    </div>
                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="text" class="form-control" [(ngModel)]="s.emailAddress"/>
                    </div>
                    <div class="mb-3">
                        <label>City</label>
                        <input type="text" class="form-control" [(ngModel)]="s.city"/>
                    </div>
                </div>
                <div class="card-footer">
                    <input type="button" value="Submit" class="btn btn-primary" (click)="addStudent(s)" [hidden]="btnstatus"/>&nbsp;
                    <input type="button" value="Update" class="btn btn-info" (click)="updateStudent(s)" [hidden]="!btnstatus" />&nbsp;
                    <input type="button" value="Cancle" class="btn btn-danger" (click)="clearData()"/>
                </div>

            </div>
        </div>
        <div class="col-md-8">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Sr No</th>
                        <th>Student Name</th>
                        <th>Mobile Number</th>
                        <th>Email Address</th>
                        <th>City</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    @for(s of students;track s;let i=$index)
                    {
                        <tr>
                            <td>{{i+1}}</td>
                            <td>{{s.studentName}}</td>
                            <td>{{s.mobileNumber}}</td>
                            <td>{{s.emailAddress}}</td>
                            <td>{{s.city}}</td>
                            <td>
                                <button class="btn btn-info btn-sm" (click)="viewStudent(s)">View</button>&nbsp;
                                <button class="btn btn-danger btn-sm" (click)="removeStudent(s.studentId)">Remove</button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
